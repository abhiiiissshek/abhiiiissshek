<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="170" version="1.1" viewBox="0 0 980 170" width="980" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><title>Quote of the day</title><desc>Generated profile component: Quote of the day</desc><defs><style type="text/css"><![CDATA[
          .fade { animation: fade .7s ease-out both; }
          .float { animation: float 3.8s ease-in-out infinite; }
          .blink { animation: blink 1.1s step-end infinite; }
          .pulse { animation: pulse 2.8s ease-in-out infinite; }
          .reveal { animation: reveal .8s ease-out both; }
          .typing { animation: typing 1.15s steps(8, end) both; }
          @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
          @keyframes blink { 50% { opacity:0; } }
          @keyframes pulse { 50% { opacity:.45; } }
          @keyframes reveal { from { opacity:0; transform:scale(.985); } to { opacity:1; transform:scale(1); } }
          @keyframes typing { from { opacity:0; letter-spacing:7px; } to { opacity:1; letter-spacing:0; } }
        ]]></style></defs><rect fill="#0d1117" height="170" rx="18" width="980" x="0" y="0" /><rect fill="#111820" height="168" rx="18" stroke="#30363d" stroke-width="1" width="978" x="1" y="1" /><text fill="#58a6ff" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="12" font-weight="700" text-anchor="middle" x="490" y="42">QUOTE OF THE DAY</text><text class="fade" fill="#c9d1d9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" text-anchor="middle" x="490" y="91">“First, solve the problem. Then, write the code.”</text><text fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="400" text-anchor="middle" x="490" y="125">— John Johnson</text></svg>