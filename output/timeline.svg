          .traffic-green { animation: traffic 3.4s .44s ease-in-out infinite; }
          .float-a { animation: float-a 4s ease-in-out infinite; }
          .float-b { animation: float-b 4.7s .35s ease-in-out infinite; }
          .float-c { animation: float-c 5.3s .7s ease-in-out infinite; }
          .breathe { animation: breathe 3.8s ease-in-out infinite; }
          .breathe-two { animation: breathe 4.5s .5s ease-in-out infinite; }
          .cmd-1 { animation: command-1 2.1s linear both; }
          .cmd-2 { animation: command-2 2.1s linear both; }
          .cmd-3 { animation: command-3 2.1s linear both; }
