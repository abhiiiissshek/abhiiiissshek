<svg baseProfile="full" height="218" version="1.1" viewBox="0 0 980 218" width="980" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><title>GitHub statistics</title><desc>Generated profile component: GitHub statistics</desc><defs><style type="text/css"><![CDATA[
