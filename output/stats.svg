          .pulse { animation: pulse 2.8s ease-in-out infinite; }
          .reveal { animation: reveal .8s ease-out both; }
          .typing { animation: typing 1.15s steps(8, end) both; }
          @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
          @keyframes blink { 50% { opacity:0; } }
          @keyframes pulse { 50% { opacity:.45; } }
          @keyframes reveal { from { opacity:0; transform:scale(.985); } to { opacity:1; transform:scale(1); } }
          @keyframes typing { from { opacity:0; letter-spacing:7px; } to { opacity:1; letter-spacing:0; } }
