<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="225" version="1.1" viewBox="0 0 980 225" width="980" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><title>Profile footer</title><desc>Animated GitHub profile component: Profile footer</desc><defs><style type="text/css"><![CDATA[
          .fade-up { animation: fade-up .8s cubic-bezier(.16,1,.3,1) both; }
          .fade-late { animation: fade-up .9s .18s cubic-bezier(.16,1,.3,1) both; }
          .quote-in { animation: quote-in 1.15s ease-out both; }
          .sweep { opacity: 0.12; animation: glass-sweep 4s ease-in-out infinite; }
          .cursor { animation: cursor-fade 1.55s ease-in-out infinite; }
          .traffic-red { animation: traffic 3.4s ease-in-out infinite; }
          .traffic-yellow { animation: traffic 3.4s .22s ease-in-out infinite; }
          .traffic-green { animation: traffic 3.4s .44s ease-in-out infinite; }
          .float-a { animation: float-a 4s ease-in-out infinite; }
          .float-b { animation: float-b 4.7s .35s ease-in-out infinite; }
          .float-c { animation: float-c 5.3s .7s ease-in-out infinite; }
          .breathe { animation: breathe 3.8s ease-in-out infinite; }
          .breathe-two { animation: breathe 4.5s .5s ease-in-out infinite; }
          .cmd-1 { animation: command-1 2.1s linear both; }
          .cmd-2 { animation: command-2 2.1s linear both; }
          .cmd-3 { animation: command-3 2.1s linear both; }
          .cmd-4 { animation: command-4 2.1s linear both; }
          .cmd-5 { animation: command-5 2.1s linear both; }
          .cmd-6 { animation: command-6 2.1s linear both; }
          .border-runner {
    fill: none;
    stroke: #58a6ff;
    stroke-width: 2;
    stroke-linecap: round;
    animation: border-run 5s linear infinite;
}

@keyframes border-run {
    from {
        stroke-dashoffset: var(--perimeter);
    }

    to {
        stroke-dashoffset: 0;
    }
}
          @keyframes fade-up { from { opacity:0; transform:translateY(9px); } to { opacity:1; transform:translateY(0); } }
          @keyframes quote-in { from { opacity:0; transform:translateY(7px); } 70% { opacity:1; } to { opacity:1; transform:translateY(0); } }
          @keyframes glass-sweep {
    from {
        transform: translateX(-320px);
    }

    to {
        transform: translateX(1180px);
    }
}
          @keyframes cursor-fade { 0%,100% { opacity:.18; } 48% { opacity:1; } }
          @keyframes traffic { 0%,100% { opacity:.78; } 50% { opacity:1; } }
          @keyframes float-a { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
          @keyframes float-b { 0%,100% { transform:translateY(-2px); } 50% { transform:translateY(4px); } }
          @keyframes float-c { 0%,100% { transform:translateY(2px); } 50% { transform:translateY(-4px); } }
          @keyframes breathe { 0%,100% { opacity:.7; } 50% { opacity:1; } }
          @keyframes command-1 { 0%,14% { opacity:1; } 15%,100% { opacity:0; } }
          @keyframes command-2 { 0%,14% { opacity:0; } 15%,29% { opacity:1; } 30%,100% { opacity:0; } }
          @keyframes command-3 { 0%,29% { opacity:0; } 30%,44% { opacity:1; } 45%,100% { opacity:0; } }
          @keyframes command-4 { 0%,44% { opacity:0; } 45%,59% { opacity:1; } 60%,100% { opacity:0; } }
          @keyframes command-5 { 0%,59% { opacity:0; } 60%,74% { opacity:1; } 75%,100% { opacity:0; } }
          @keyframes command-6 { 0%,74% { opacity:0; } 75%,100% { opacity:1; } }
          .border-runner {
    fill: none;
    stroke: #58a6ff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 70 2790;
    animation: border-run 5s linear infinite;
}

@keyframes border-run {
    from {
        stroke-dashoffset: 2860;
    }

    to {
        stroke-dashoffset: 0;
    }
}
        ]]></style></defs><rect fill="#0d1117" height="225" rx="20" width="980" x="0" y="0" /><rect class="hero-border" fill="#10161f" height="223" opacity="1" rx="20" stroke="#58a6ff" stroke-width="1" width="978" x="1" y="1" /><rect class="border-runner" fill="none" height="223" rx="20" stroke="#58a6ff" stroke-dasharray="72.06 2402" stroke-dashoffset="2402" stroke-width="2" style="&#10;                stroke-dasharray:72.06 2402;&#10;                stroke-dashoffset:2402;&#10;                animation:border-run 5s linear infinite;&#10;                " width="978" x="1" y="1" /><text fill="#3fb950" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="14" font-weight="700" text-anchor="start" x="32" y="42">$ logout</text><a target="_blank" xlink:href="https://github.com/abhiiiissshek"><text fill="#58a6ff" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="11" font-weight="700" text-anchor="middle" x="385" y="43">GitHub</text></a><a target="_blank" xlink:href="https://www.linkedin.com/in/abhishek-sharma/"><text fill="#58a6ff" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="11" font-weight="700" text-anchor="middle" x="490" y="43">LinkedIn</text></a><line opacity="1" stroke="#21262d" stroke-width="1" x1="32" x2="948" y1="67" y2="67" /><text fill="#3fb950" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="15" font-weight="400" text-anchor="middle" x="490" y="108">Connection closed.</text><text class="fade-up" fill="#e6edf3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle" x="490" y="142">Thanks for visiting.</text><text class="fade-late" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" text-anchor="middle" x="490" y="171">See you on the next commit.</text><text fill="#3fb950" font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="14" font-weight="700" text-anchor="end" x="462" y="205">$</text></svg>